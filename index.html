<!doctype html>
<html lang="es-PY">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="description" content="Cultura paraguaya, una tarjeta a la vez. 2940 entries curados: lugares, naturaleza, idioma guaraní, cultura, comida, personajes, historia, leyendas y sociedad.">
  <title>Jaikuaa — cultura paraguaya, una tarjeta a la vez</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">

  <script>
  // Kill-switch: el HTML lleva la versión exacta esperada del SW.
  // Si el SW activo NO matchea, se desregistra, se borran todos los
  // caches y se recarga. Como el HTML es no-cache en Cloudflare, este
  // chequeo siempre usa el valor más reciente del deploy.
  (function () {
    var EXPECTED = 'jaikuaa-v1.10.0';
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.getRegistration().then(function (reg) {
      if (!reg || !reg.active) return;
      if (sessionStorage.getItem('jk_nuked_' + EXPECTED)) return;
      var resolved = false;
      var ch = new MessageChannel();
      ch.port1.onmessage = function (e) {
        resolved = true;
        var v = (e.data && e.data.version) || '';
        if (v !== EXPECTED) nuke(reg);
      };
      setTimeout(function () { if (!resolved) nuke(reg); }, 1500);
      try { reg.active.postMessage({ type: 'VERSION' }, [ch.port2]); }
      catch (_) { nuke(reg); }
    });
    function nuke(reg) {
      sessionStorage.setItem('jk_nuked_' + 'jaikuaa-v1.10.0', '1');
      Promise.all([
        reg.unregister(),
        caches.keys().then(function (ks) {
          return Promise.all(ks.map(function (k) { return caches.delete(k); }));
        })
      ]).then(function () { location.reload(); });
    }
  })();
  </script>
</head>
<body>
  <div class="fireflies" aria-hidden="true">
    <span class="firefly" style="left:12%;top:18%;--d:0s"></span>
    <span class="firefly" style="left:84%;top:24%;--d:1.4s"></span>
    <span class="firefly" style="left:22%;top:62%;--d:2.6s"></span>
    <span class="firefly" style="left:70%;top:78%;--d:0.8s"></span>
    <span class="firefly" style="left:50%;top:12%;--d:3.2s"></span>
    <span class="firefly" style="left:8%;top:88%;--d:4.1s"></span>
    <span class="firefly" style="left:92%;top:55%;--d:2.0s"></span>
    <span class="firefly" style="left:38%;top:42%;--d:5.0s"></span>
  </div>

  <div id="splash" class="splash" aria-hidden="false">
    <span class="splash-word">Jaikuaa</span>
    <span class="splash-tagline">una postal del Paraguay</span>
  </div>

  <main id="view" class="view" aria-live="polite"></main>

  <nav id="nav" class="bottom-nav" aria-label="Navegación principal" hidden>
    <button class="nav-btn" data-action="route" data-route="favorites" aria-label="Favoritos">
      <span class="nav-ico" data-ico="star"></span>
      <span class="nav-label">favoritos</span>
    </button>
    <button class="nav-btn" data-action="route" data-route="" aria-label="Descubrir">
      <span class="nav-ico" data-ico="dice"></span>
      <span class="nav-label">descubrir</span>
    </button>
    <button class="nav-btn" data-action="route" data-route="map" aria-label="Mapa">
      <span class="nav-ico" data-ico="map"></span>
      <span class="nav-label">mapa</span>
    </button>
    <button class="nav-btn" data-action="route" data-route="search" aria-label="Buscar">
      <span class="nav-ico" data-ico="search"></span>
      <span class="nav-label">buscar</span>
    </button>
    <button class="nav-btn" data-action="route" data-route="settings" aria-label="Ajustes">
      <span class="nav-ico" data-ico="gear"></span>
      <span class="nav-label">ajustes</span>
    </button>
    <span class="nav-offline-dot" id="offline-dot" hidden aria-label="Sin conexión"></span>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="sheet" class="sheet" hidden></div>

  <div id="swipe-hint" class="swipe-hint" hidden aria-hidden="true">
    <span class="swipe-arrow up">↑</span>
    <span class="swipe-hint-text">deslizá hacia arriba<br>para seguir descubriendo</span>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
